<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Progress Bar Widget</title>
<style>
  :root {
    color-scheme: light dark;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    display: flex;
    align-items: center;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .widget {
    width: 100%;
    box-sizing: border-box;
    padding: 14px 18px;
  }
  .widget__header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    font-size: 14px;
    color: #37352f;
  }
  .widget__label {
    font-weight: 600;
  }
  .widget__value {
    font-variant-numeric: tabular-nums;
    color: #6b7280;
  }
  .track {
    width: 100%;
    height: var(--bar-height, 12px);
    border-radius: 999px;
    background: #ececea;
    overflow: hidden;
  }
  .fill {
    height: 100%;
    border-radius: 999px;
    background: #2f80ed;
    width: 0%;
    transition: width 0.4s ease;
  }

  @media (prefers-color-scheme: dark) {
    .widget__header { color: #e6e6e5; }
    .widget__value { color: #9b9a97; }
    .track { background: #3a3a38; }
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="widget__header">
      <span class="widget__label" id="label">Progress</span>
      <span class="widget__value" id="value-text">0%</span>
    </div>
    <div class="track">
      <div class="fill" id="fill"></div>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const mode = params.get("mode") || "value";
  const color = params.get("color") ? "#" + params.get("color").replace(/^#/, "") : "#2f80ed";
  const showPercent = params.get("showPercent") !== "false";
  const showDaysLeft = params.get("showDaysLeft") === "true";

  const FONT_STACKS = {
    default: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif',
    serif: 'Georgia, "Times New Roman", serif',
    mono: '"SF Mono", Consolas, "Courier New", monospace',
    rounded: '"Century Gothic", Futura, sans-serif',
    condensed: '"Arial Narrow", Arial, sans-serif'
  };
  const BAR_HEIGHTS = { thin: "6px", medium: "12px", thick: "20px" };

  document.body.style.fontFamily = FONT_STACKS[params.get("font")] || FONT_STACKS.default;
  document.documentElement.style.setProperty("--bar-height", BAR_HEIGHTS[params.get("size")] || BAR_HEIGHTS.medium);

  const MS_PER_DAY = 86400000;
  const clamp = (n) => Math.min(100, Math.max(0, n));

  // Malformed/reversed dates fall back to null so callers can default to the static "value" param.
  function dateRangeProgress(start, end) {
    if (isNaN(start) || isNaN(end) || end <= start) return null;
    const now = Date.now();
    return {
      percent: clamp(((now - start) / (end - start)) * 100),
      daysLeft: Math.max(0, Math.ceil((end - now) / MS_PER_DAY))
    };
  }

  function compute() {
    let value, label, daysLeft = null;

    if (mode === "year") {
      const year = parseInt(params.get("year"), 10) || new Date().getFullYear();
      const result = dateRangeProgress(new Date(year, 0, 1).getTime(), new Date(year + 1, 0, 1).getTime());
      value = result ? result.percent : 0;
      daysLeft = result ? result.daysLeft : null;
      label = params.get("label") || (year + " Progress");
    } else if (mode === "daterange") {
      const result = dateRangeProgress(new Date(params.get("startDate")).getTime(), new Date(params.get("endDate")).getTime());
      value = result ? result.percent : clamp(parseFloat(params.get("value")) || 0);
      daysLeft = result ? result.daysLeft : null;
      label = params.get("label") || "Progress";
    } else {
      value = clamp(parseFloat(params.get("value")) || 0);
      label = params.get("label") || "Progress";
    }

    document.getElementById("label").textContent = label;
    document.getElementById("fill").style.width = value + "%";
    document.getElementById("fill").style.background = color;

    let valueText = showPercent ? Math.round(value) + "%" : "";
    if (showDaysLeft && daysLeft !== null) {
      valueText += (valueText ? " · " : "") + daysLeft + (daysLeft === 1 ? " day left" : " days left");
    }
    document.getElementById("value-text").textContent = valueText;
  }

  compute();
  setInterval(compute, 60 * 60 * 1000);
</script>
</body>
</html>
